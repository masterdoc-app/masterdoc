# masterdoc.pro — статический сайт (корень: /var/www/masterdoc)
# TLS: certbot certonly --webroot -w /var/www/masterdoc -d masterdoc.pro -d www.masterdoc.pro
#      (сертификаты: /etc/letsencrypt/live/masterdoc.pro/)

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name masterdoc.pro www.masterdoc.pro;

    ssl_certificate /etc/letsencrypt/live/masterdoc.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/masterdoc.pro/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/masterdoc;
    index index.html;

    location ^~ /.well-known/acme-challenge/ {
        default_type text/plain;
        allow all;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(ico|css|js|gif|jpe?g|png|svg|webp|woff2?|webmanifest)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable" always;
    }

    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

server {
    listen 80;
    listen [::]:80;
    server_name masterdoc.pro www.masterdoc.pro;

    root /var/www/masterdoc;

    location ^~ /.well-known/acme-challenge/ {
        default_type text/plain;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
